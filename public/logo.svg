<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Yacine — uchiwa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17171B"/>
      <stop offset="1" stop-color="#0A0A0C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0DDA0"/>
      <stop offset="0.5" stop-color="#C9A24B"/>
      <stop offset="1" stop-color="#B8892F"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F24A4A"/>
      <stop offset="0.45" stop-color="#E20909"/>
      <stop offset="1" stop-color="#A50606"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF5E9"/>
      <stop offset="1" stop-color="#E4D8BC"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.35" cy="0.28" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="fan"><circle cx="256" cy="205" r="135"/></clipPath>
  </defs>

  <!-- badge -->
  <rect x="18" y="18" width="476" height="476" rx="126" fill="url(#bg)" stroke="url(#gold)" stroke-width="7"/>

  <!-- manche -->
  <path d="M 233 300 L 217 418 Q 216 431 229 431 L 283 431 Q 296 431 295 418 L 279 300 Z"
        fill="url(#cream)" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round"/>

  <!-- éventail : bas crème, haut rouge, reflet -->
  <g clip-path="url(#fan)">
    <rect x="0" y="0" width="512" height="512" fill="url(#cream)"/>
    <rect x="0" y="0" width="512" height="196" fill="url(#red)"/>
    <ellipse cx="205" cy="140" rx="95" ry="62" fill="url(#gloss)"/>
  </g>

  <!-- contour de l'éventail -->
  <circle cx="256" cy="205" r="135" fill="none" stroke="url(#gold)" stroke-width="11"/>
</svg>
